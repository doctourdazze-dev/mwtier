<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MWTier | Official Leaderboard</title>
    <style>
        :root {
            --bg: #030508; --card: #0d1117; --border: #30363d;
            --blue: #58a6ff; --gold: #ffcc00; --text: #f0f6fc;
        }

        body { 
            margin: 0; padding: 20px; color: var(--text); font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #0d1117 0%, #030508 100%);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        /* ✨ خلفية متحركة أسطورية */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, rgba(88,166,255,0.05) 0%, transparent 70%);
            z-index: -1; animation: pulse 8s infinite alternate;
        }
        @keyframes pulse { 0% { opacity: 0.3; } 100% { opacity: 0.7; } }

        .container { width: 100%; max-width: 1200px; z-index: 10; }
        .header h1 { 
            font-size: clamp(40px, 8vw, 70px); text-align: center; letter-spacing: 12px; margin: 40px 0; 
            font-weight: 900; text-transform: uppercase; color: #fff;
            text-shadow: 0 0 20px rgba(88, 166, 255, 0.5);
        }

        .nav-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 40px; flex-wrap: wrap; }
        .nav-item { 
            background: #161b22; border: 1px solid var(--border); padding: 10px 15px; 
            border-radius: 8px; cursor: pointer; transition: 0.2s; text-align: center; min-width: 85px;
        }
        .nav-item.active { border-color: var(--blue); background: rgba(88, 166, 255, 0.15); box-shadow: 0 0 15px rgba(88, 166, 255, 0.2); }
        .nav-item span { font-size: 9px; text-transform: uppercase; display: block; margin-top: 5px; color: #8b949e; }
        .nav-img { width: 24px; height: 24px; object-fit: contain; margin: 0 auto; display: block; }

        .leaderboard { background: rgba(13, 17, 23, 0.8); border-radius: 12px; border: 1px solid var(--border); backdrop-filter: blur(15px); }
        .row { display: grid; grid-template-columns: 50px 280px 1fr; align-items: center; padding: 15px 20px; border-bottom: 1px solid #21262d; }
        
        /* 🚨 تعديل السكين: تكبير ونزول الوجه 🚨 */
        .avatar-box { 
            width: 60px; height: 60px; 
            position: relative; display: flex; align-items: center; justify-content: center; 
            overflow: hidden; 
        }
        .skin-img { 
            width: 140%; height: 140%; 
            object-fit: contain; 
            image-rendering: pixelated; 
            transform: translateY(14px); /* نزول الوجه للوسط */
        }
        
        .player-name { color: #fff; font-weight: 600; margin-left: 20px; font-size: 1.2em; }
        .skills-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 10px; }
        .skill-box { display: flex; flex-direction: column; align-items: center; opacity: 0.3; transition: 0.3s; }
        .skill-box.active-skill { opacity: 1; transform: scale(1.1); }
        .skill-img { width: 22px; height: 22px; margin-bottom: 6px; }

        .badge { padding: 4px 0; border-radius: 4px; font-size: 10px; font-weight: 900; width: 100%; text-align: center; background: #21262d; color: #8b949e; }
        
        /* 👑 ستايل ذهبي للمركز الأول */
        .top-player { background: rgba(255, 204, 0, 0.05) !important; border-left: 4px solid var(--gold); }
        .top-player .rank-num { color: var(--gold); font-size: 1.6em; text-shadow: 0 0 10px var(--gold); }
        
        .ht1, .1 { background: var(--gold) !important; color: #000 !important; box-shadow: 0 0 12px var(--gold); }
        .ht2, .2 { background: #adb5bd !important; color: #000 !important; }
        .ht3, .3 { background: #cd7f32 !important; color: #000 !important; }
        .rank-num { font-weight: 900; color: #484f58; text-align: center; }
    </style>
</head>
<body>

    <audio id="clickSound" preload="auto">
        <source src="https://www.soundjay.com/buttons/sounds/button-16.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div class="header"><h1>MWTier</h1></div>
        <div class="nav-bar">
            <div class="nav-item active" onclick="changeSort('global')">🏆<span>Overall</span></div>
            <div class="nav-item" onclick="changeSort('sword')"><img src="https://mctiers.com/tier_icons/sword.svg" class="nav-img"><span>Sword</span></div>
            <div class="nav-item" onclick="changeSort('axe')"><img src="https://mctiers.com/tier_icons/axe.svg" class="nav-img"><span>Axe</span></div>
            <div class="nav-item" onclick="changeSort('uhc')"><img src="https://static.wikia.nocookie.net/minecraft_gamepedia/images/7/74/Lava_Bucket_JE2_BE2.png" class="nav-img"><span>UHC</span></div>
            <div class="nav-item" onclick="changeSort('mace')"><img src="https://media.forgecdn.net/attachments/914/47/pack.png" class="nav-img"><span>Mace</span></div>
            <div class="nav-item" onclick="changeSort('pot')"><img src="https://mctiers.com/tier_icons/pot.svg" class="nav-img"><span>Pot</span></div>
            <div class="nav-item" onclick="changeSort('spear')"><img src="https://cdn.modrinth.com/data/IcznAN6m/75d921704c939d9cb61471dcd3a1d0b3b94ff07f.png" class="nav-img"><span>Spear</span></div>
            <div class="nav-item" onclick="changeSort('crystal')"><img src="https://cdn.modrinth.com/data/ih5VCK3n/6bd43f541a03d9a9824f536301451c9604c2ab82.png" class="nav-img"><span>Crystal</span></div>
            <div class="nav-item" onclick="changeSort('cart')"><img src="https://static.wikia.nocookie.net/minecraft/images/e/e7/MinecartWithTNT.png" class="nav-img"><span>Cart</span></div>
        </div>
        <div class="leaderboard" id="main-board"></div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSsdJmHbzVV5uDXOYEcjUr_T8T0LTbSL6EMnxdugEuwe1aZsZW0NDMm8Im_qB9xzVEWKyKG50QLhjxJ/pub?output=csv';
        
        // 🚨 روابط الصور الجديدة المباشرة 🚨
        const customSkins = {
            "MystycCr0wn": "https://i.ibb.co/vzS8mYm/mystyc-crown.png", 
            "wa__": "https://i.ibb.co/RTprQ2kX/wa.png",
            "walid_hd": "https://i.ibb.co/k66xzs6T/walid-hd.png",
            "HAMZAICZ": "https://i.ibb.co/SXtg8s4w/hamza.png"
        };

        let playersData = [];
        let currentSortKey = 'global';
        const tierMap = { 'ht1':100,'1':100,'ht2':80,'2':80,'ht3':60,'3':60 };

        async function init() {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            const rows = text.split('\n').slice(1);
            playersData = rows.map(r => {
                const c = r.split(',').map(s => s.trim());
                return {
                    name: c[0], global: c[1], sword: c[2], axe: c[3], uhc: c[4],
                    mace: c[5], pot: c[6], spear: c[7], crystal: c[11], cart: c[12]
                };
            }).filter(p => p.name);
            render();
        }

        function playSound() {
            const audio = document.getElementById('clickSound');
            audio.currentTime = 0;
            audio.play().catch(() => {});
        }

        function render() {
            playersData.sort((a, b) => (tierMap[b[currentSortKey]?.toLowerCase()] || 0) - (tierMap[a[currentSortKey]?.toLowerCase()] || 0));
            const board = document.getElementById('main-board');
            board.innerHTML = '';
            playersData.forEach((p, i) => {
                const skin = customSkins[p.name] || `https://mc-heads.net/avatar/${p.name}`;
                board.innerHTML += `
                    <div class="row ${i === 0 ? 'top-player' : ''}">
                        <div class="rank-num">${i === 0 ? '👑' : i + 1}</div>
                        <div style="display:flex; align-items:center;">
                            <div class="avatar-box"><img class="skin-img" src="${skin}"></div>
                            <span class="player-name">${p.name}</span>
                        </div>
                        <div class="skills-grid">
                            ${skill(p.global, '🏆', 'global', true)}
                            ${skill(p.sword, 'https://mctiers.com/tier_icons/sword.svg', 'sword')}
                            ${skill(p.axe, 'https://mctiers.com/tier_icons/axe.svg', 'axe')}
                            ${skill(p.uhc, 'https://static.wikia.nocookie.net/minecraft_gamepedia/images/7/74/Lava_Bucket_JE2_BE2.png', 'uhc')}
                            ${skill(p.mace, 'https://media.forgecdn.net/attachments/914/47/pack.png', 'mace')}
                            ${skill(p.pot, 'https://mctiers.com/tier_icons/pot.svg', 'pot')}
                            ${skill(p.spear, 'https://cdn.modrinth.com/data/IcznAN6m/75d921704c939d9cb61471dcd3a1d0b3b94ff07f.png', 'spear')}
                            ${skill(p.crystal, 'https://cdn.modrinth.com/data/ih5VCK3n/6bd43f541a03d9a9824f536301451c9604c2ab82.png', 'crystal')}
                            ${skill(p.cart, 'https://static.wikia.nocookie.net/minecraft/images/e/e7/MinecartWithTNT.png', 'cart')}
                        </div>
                    </div>`;
            });
        }

        function skill(val, img, key, emoji = false) {
            const active = (currentSortKey === key) ? 'active-skill' : '';
            return `<div class="skill-box ${active}">${emoji ? `<span>${img}</span>` : `<img src="${img}" class="skill-img">`}<span class="badge ${val?.toLowerCase() || ''}">${val || '--'}</span></div>`;
        }

        function changeSort(key) {
            playSound();
            currentSortKey = key;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            render();
        }
        init();
    </script>
</body>
</html>
