<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MWTier | Leaderboard</title>
    <style>
        :root {
            --bg: #050000; --border: #3d0505;
            --red-glow: #ff0000; --gold: #ffcc00; --silver: #adb5bd; --text: #f0f6fc;
        }

        body { 
            margin: 0; padding: 0; color: var(--text); font-family: 'Inter', sans-serif;
            background-color: var(--bg); overflow-x: hidden;
        }

        /* --- ✨ Animated Background ✨ --- */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(150, 0, 0, 0.15) 0%, transparent 70%);
            z-index: -1; animation: pulse 6s infinite alternate ease-in-out;
        }
        @keyframes pulse { 0% { opacity: 0.5; } 100% { opacity: 1; } }

        /* --- ⏳ Loading Screen --- */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050000; display: flex; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.8s ease;
        }
        .loading-text { letter-spacing: 5px; font-size: 12px; font-weight: bold; margin-top: 20px; text-align: center;}

        /* --- 🏆 Main Content --- */
        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 20px; display: none; }
        .header h1 { 
            font-size: clamp(30px, 8vw, 70px); text-align: center; letter-spacing: 12px; margin: 30px 0; 
            font-weight: 900; text-transform: uppercase; color: #fff; text-shadow: 0 0 20px var(--red-glow);
        }

        .nav-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 30px; }
        .nav-item { 
            background: #1a0505; border: 1px solid var(--border); padding: 12px 5px; 
            border-radius: 8px; cursor: pointer; text-align: center;
        }
        .nav-item.active { border-color: var(--red-glow); background: rgba(255, 0, 0, 0.2); }
        
        /* 🚨 تكبير الأيقونات في الـ Nav Bar 🚨 */
        .nav-img { 
            width: 32px; height: 32px; /* كبرنا العرض والطول */
            object-fit: contain; margin: 0 auto 5px; display: block; 
            transform: scale(1.3); /* زيادة الحجم بنسبة 30% */
            filter: drop-shadow(0 0 5px var(--red-glow)); /* إضافة وهج */
        }
        .nav-item span { font-size: 10px; text-transform: uppercase; color: #8b949e; font-weight: bold; }

        .leaderboard { background: rgba(13, 1, 1, 0.9); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        .row { display: grid; grid-template-columns: 70px 1fr 80px; align-items: center; padding: 18px 15px; border-bottom: 1px solid #2d0505; }
        
        /* 🥇 Ranks 🥇 */
        .rank-num { font-size: 1.6em; font-weight: 900; color: #777; text-align: center; }
        .row:nth-child(1) { border-left: 5px solid var(--gold); background: rgba(255, 204, 0, 0.05); }
        .row:nth-child(1) .rank-num { color: var(--gold); font-size: 2em; }

        .avatar-box { 
            width: 60px; height: 60px; overflow: hidden; display: flex; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.05); border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .skin-img { width: 165%; height: 165%; object-fit: cover; image-rendering: pixelated; }
        .player-name { font-weight: 700; margin-left: 15px; font-size: 1.3em; color: #fff; }
        
        /* 🚨 تكبير الأيقونات في شبكة المهارات (PC) 🚨 */
        .skill-img { 
            width: 28px; height: 28px; 
            transform: scale(1.4); 
            filter: drop-shadow(0 0 3px rgba(255,0,0,0.5));
        }

        .badge { padding: 6px 0; border-radius: 6px; font-size: 12px; font-weight: 900; width: 55px; text-align: center; background: #2d0505; color: #fff; }
        .ht1, .1 { background: #ff0000 !important; box-shadow: 0 0 10px #ff0000; }

        @media (min-width: 769px) {
            .nav-bar { grid-template-columns: repeat(9, 1fr); }
            .row { grid-template-columns: 80px 300px 1fr; }
            .skills-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 10px; }
            .mobile-badge-container { display: none; }
        }
        @media (max-width: 768px) { .skills-grid { display: none; } .mobile-badge-container { display: flex; justify-content: flex-end; } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-box">
            <div class="loading-text">LOADING... <span id="percent">0</span>%</div>
        </div>
    </div>

    <div class="container" id="main-content">
        <div class="header"><h1>MWTIER</h1></div>
        <div class="nav-bar">
            <div class="nav-item active" onclick="changeSort('global', event)"><img src="https://pvptiers.com/icons/tiers/overall.png" class="nav-img"><span>Overall</span></div>
            <div class="nav-item" onclick="changeSort('sword', event)"><img src="https://mctiers.com/tier_icons/sword.svg" class="nav-img"><span>Sword</span></div>
            <div class="nav-item" onclick="changeSort('axe', event)"><img src="https://pvptiers.com/icons/tiers/axe.png" class="nav-img"><span>Axe</span></div>
            <div class="nav-item" onclick="changeSort('uhc', event)"><img src="https://static.wikia.nocookie.net/minecraft_gamepedia/images/7/74/Lava_Bucket_JE2_BE2.png" class="nav-img"><span>UHC</span></div>
            <div class="nav-item" onclick="changeSort('mace', event)"><img src="https://media.forgecdn.net/attachments/914/47/pack.png" class="nav-img"><span>Mace</span></div>
            <div class="nav-item" onclick="changeSort('pot', event)"><img src="https://mctiers.com/tier_icons/pot.svg" class="nav-img"><span>Pot</span></div>
            <div class="nav-item" onclick="changeSort('spear', event)"><img src="https://cdn.modrinth.com/data/IcznAN6m/75d921704c939d9cb61471dcd3a1d0b3b94ff07f.png" class="nav-img"><span>Spear</span></div>
            <div class="nav-item" onclick="changeSort('crystal', event)"><img src="https://cdn.modrinth.com/data/ih5VCK3n/6bd43f541a03d9a9824f536301451c9604c2ab82.png" class="nav-img"><span>Crystal</span></div>
            <div class="nav-item" onclick="changeSort('cart', event)"><img src="https://static.wikia.nocookie.net/minecraft/images/e/e7/MinecartWithTNT.png" class="nav-img"><span>Cart</span></div>
        </div>
        <div class="leaderboard" id="main-board"></div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSsdJmHbzVV5uDXOYEcjUr_T8T0LTbSL6EMnxdugEuwe1aZsZW0NDMm8Im_qB9xzVEWKyKG50QLhjxJ/pub?output=csv';
        const customSkins = { "MystycCr0wn": "https://i.ibb.co/rfvySyzd/avatar-Head3.png", "wa__": "https://i.ibb.co/RTprQ2kX/wa.png", "walid_hd": "https://i.ibb.co/k66xzs6T/walid-hd.png", "HAMZAICZ": "https://i.ibb.co/SXtg8s4w/hamza.png", "minimokito": "https://i.ibb.co/v4jBX2TR/minimokito.png" };
        let playersData = [];
        let currentSortKey = 'global';
        const tierMap = { 'ht1':100,'1':100,'ht2':80,'2':80,'ht3':60,'3':60 };

        async function init() {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            const rows = text.split('\n').slice(1);
            playersData = rows.map(r => {
                const c = r.split(',').map(s => s.trim());
                return { name: c[0], global: c[1], sword: c[2], axe: c[3], uhc: c[4], mace: c[5], pot: c[6], spear: c[7], crystal: c[11], cart: c[12] };
            }).filter(p => p.name);
            render();
        }

        function render() {
            playersData.sort((a, b) => (tierMap[b[currentSortKey]?.toLowerCase()] || 0) - (tierMap[a[currentSortKey]?.toLowerCase()] || 0));
            const board = document.getElementById('main-board');
            board.innerHTML = '';
            playersData.forEach((p, i) => {
                const skin = customSkins[p.name] || `https://mc-heads.net/avatar/${p.name}`;
                board.innerHTML += `
                    <div class="row">
                        <div class="rank-num">${i + 1}</div>
                        <div style="display:flex; align-items:center;">
                            <div class="avatar-box"><img class="skin-img" src="${skin}"></div>
                            <span class="player-name">${p.name}</span>
                        </div>
                        <div class="mobile-badge-container"><div class="badge ${p[currentSortKey]?.toLowerCase() || ''}">${p[currentSortKey] || '--'}</div></div>
                        <div class="skills-grid">
                            ${skill(p.global, 'https://pvptiers.com/icons/tiers/overall.png', 'global')}
                            ${skill(p.sword, 'https://mctiers.com/tier_icons/sword.svg', 'sword')}
                            ${skill(p.axe, 'https://pvptiers.com/icons/tiers/axe.png', 'axe')}
                            ${skill(p.uhc, 'https://static.wikia.nocookie.net/minecraft_gamepedia/images/7/74/Lava_Bucket_JE2_BE2.png', 'uhc')}
                            ${skill(p.mace, 'https://media.forgecdn.net/attachments/914/47/pack.png', 'mace')}
                            ${skill(p.pot, 'https://mctiers.com/tier_icons/pot.svg', 'pot')}
                            ${skill(p.spear, 'https://cdn.modrinth.com/data/IcznAN6m/75d921704c939d9cb61471dcd3a1d0b3b94ff07f.png', 'spear')}
                            ${skill(p.crystal, 'https://cdn.modrinth.com/data/ih5VCK3n/6bd43f541a03d9a9824f536301451c9604c2ab82.png', 'crystal')}
                            ${skill(p.cart, 'https://static.wikia.nocookie.net/minecraft/images/e/e7/MinecartWithTNT.png', 'cart')}
                        </div>
                    </div>`;
            });
        }

        function skill(val, img, key) {
            const active = (currentSortKey === key) ? 'style="opacity:1; transform:scale(1.2);"' : 'style="opacity:0.3"';
            return `<div class="skill-box" ${active}><img src="${img}" class="skill-img"><span class="badge ${val?.toLowerCase() || ''}">${val || '--'}</span></div>`;
        }

        function changeSort(key, event) {
            currentSortKey = key;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            render();
        }

        window.onload = () => {
            let count = 0;
            let interval = setInterval(() => {
                count++; document.getElementById('percent').innerText = count;
                if (count >= 100) { clearInterval(interval); document.getElementById('loading-screen').style.opacity = '0';
                    setTimeout(() => { document.getElementById('loading-screen').style.display = 'none'; document.getElementById('main-content').style.display = 'block'; }, 800);
                }
            }, 45); init();
        };
    </script>
</body>
</html>
