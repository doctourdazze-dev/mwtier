<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MWTier | Official Leaderboard</title>
    <style>
        :root {
            --bg: #050000; /* كحل غامق مائل للأحمر */
            --card: #0d0101; 
            --border: #3d0505;
            --red-glow: #ff0000;
            --text: #f0f6fc;
        }

        body { 
            margin: 0; padding: 20px; color: var(--text); font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }

        /* ✨ خلفية متحركة باللون الأحمر ✨ */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 0, 0, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(150, 0, 0, 0.1) 0%, transparent 50%);
            z-index: -1; 
            animation: moveBg 10s infinite alternate linear;
        }

        @keyframes moveBg {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 0.8; }
        }

        .container { width: 100%; max-width: 1200px; z-index: 10; }
        
        .header h1 { 
            font-size: clamp(40px, 8vw, 70px); text-align: center; letter-spacing: 12px; margin: 40px 0; 
            font-weight: 900; text-transform: uppercase; color: #fff;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.7); /* ضوء أحمر */
        }

        .nav-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 40px; flex-wrap: wrap; }
        .nav-item { 
            background: #1a0505; border: 1px solid var(--border); padding: 10px 15px; 
            border-radius: 8px; cursor: pointer; transition: 0.2s; text-align: center; min-width: 85px;
        }
        .nav-item.active { border-color: var(--red-glow); background: rgba(255, 0, 0, 0.15); box-shadow: 0 0 15px rgba(255, 0, 0, 0.3); }

        .leaderboard { 
            background: rgba(13, 1, 1, 0.9); 
            border-radius: 12px; border: 1px solid var(--border); 
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .row { display: grid; grid-template-columns: 50px 280px 1fr; align-items: center; padding: 12px 20px; border-bottom: 1px solid #2d0505; transition: 0.3s; }
        .row:hover { background: rgba(255, 0, 0, 0.03); }
        
        /* 🚨 إعدادات الـ Zoom للرؤوس 🚨 */
        .avatar-box { 
            width: 65px; height: 65px; 
            position: relative; display: flex; align-items: center; justify-content: center; 
            overflow: hidden; background: rgba(255, 255, 255, 0.05); border-radius: 10px;
            border: 1px solid rgba(255, 0, 0, 0.2);
        }
        .skin-img { 
            width: 165%; height: 165%; 
            object-fit: cover;
            image-rendering: pixelated; 
        }
        
        .player-name { color: #fff; font-weight: 600; margin-left: 20px; font-size: 1.25em; }
        .skills-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 10px; }
        .skill-box { display: flex; flex-direction: column; align-items: center; opacity: 0.4; transition: 0.3s; }
        .skill-box.active-skill { opacity: 1; transform: scale(1.1); }
        .badge { padding: 4px 0; border-radius: 4px; font-size: 10px; font-weight: 900; width: 100%; text-align: center; background: #2d0505; color: #a18a8a; }
        
        /* الألوان الخاصة بالرتب */
        .ht1, .1 { background: #ff0000 !important; color: #fff !important; box-shadow: 0 0 10px #ff0000; }
        .ht2, .2 { background: #b30000 !important; color: #fff !important; }
        .ht3, .3 { background: #800000 !important; color: #fff !important; }
        .rank-num { font-weight: 900; color: #5a1a1a; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header"><h1>MWTier</h1></div>
        <div class="nav-bar">
            <div class="nav-item active" onclick="changeSort('global')">🏆<span>Overall</span></div>
            </div>
        <div class="leaderboard" id="main-board"></div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSsdJmHbzVV5uDXOYEcjUr_T8T0LTbSL6EMnxdugEcwe1aZsZW0NDMm8Im_qB9xzVEWKyKG50QLhjxJ/pub?output=csv';
        
        // 🚨 إضافة minimokito والروابط المباشرة 🚨
        const customSkins = {
            "MystycCr0wn": "https://i.ibb.co/rfvySyzd/avatar-Head3.png", 
            "wa__": "https://i.ibb.co/RTprQ2kX/wa.png",
            "walid_hd": "https://i.ibb.co/k66xzs6T/walid-hd.png",
            "HAMZAICZ": "https://i.ibb.co/SXtg8s4w/hamza.png",
            "minimokito": "https://i.ibb.co/v4jBX2TR/minimokito.png"
        };

        let playersData = [];
        let currentSortKey = 'global';
        const tierMap = { 'ht1':100,'1':100,'ht2':80,'2':80,'ht3':60,'3':60 };

        async function init() {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            const rows = text.split('\n').slice(1);
            playersData = rows.map(r => {
                const c = r.split(',').map(s => s.trim());
                return {
                    name: c[0], global: c[1], sword: c[2], axe: c[3], uhc: c[4],
                    mace: c[5], pot: c[6], spear: c[7], crystal: c[11], cart: c[12]
                };
            }).filter(p => p.name);
            render();
        }

        function render() {
            playersData.sort((a, b) => (tierMap[b[currentSortKey]?.toLowerCase()] || 0) - (tierMap[a[currentSortKey]?.toLowerCase()] || 0));
            const board = document.getElementById('main-board');
            board.innerHTML = '';
            playersData.forEach((p, i) => {
                const skin = customSkins[p.name] || `https://mc-heads.net/avatar/${p.name}`;
                board.innerHTML += `
                    <div class="row">
                        <div class="rank-num">${i + 1}</div>
                        <div style="display:flex; align-items:center;">
                            <div class="avatar-box"><img class="skin-img" src="${skin}"></div>
                            <span class="player-name">${p.name}</span>
                        </div>
                        <div class="skills-grid">
                            ${skill(p.global, '🏆', 'global', true)}
                            </div>
                    </div>`;
            });
        }

        function skill(val, img, key, emoji = false) {
            const active = (currentSortKey === key) ? 'active-skill' : '';
            return `<div class="skill-box ${active}">${emoji ? `<span>${img}</span>` : `<img src="${img}" class="skill-img">`}<span class="badge ${val?.toLowerCase() || ''}">${val || '--'}</span></div>`;
        }

        function changeSort(key) {
            currentSortKey = key;
            render();
        }
        init();
    </script>
</body>
</html>
