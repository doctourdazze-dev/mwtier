<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MWTier | Pro Rankings</title>
    <style>
        :root {
            --bg: #05070a; --card: #0d1117; --border: #30363d;
            --blue: #58a6ff; --gold: #f1c40f; --text: #f0f6fc;
        }

        body { 
            margin: 0; padding: 20px; color: var(--text); font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(-45deg, #05070a, #0d1117, #161b22, #05070a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container { width: 100%; max-width: 1250px; }
        .header h1 { 
            font-size: 55px; text-align: center; letter-spacing: 8px; margin-bottom: 30px; 
            font-weight: 900; text-transform: uppercase;
            background: linear-gradient(to right, #58a6ff, #f1c40f);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Nav Bar */
        .nav-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .nav-item { 
            background: rgba(22, 27, 34, 0.8); border: 1px solid var(--border); padding: 12px 18px; 
            border-radius: 12px; cursor: pointer; transition: 0.3s; text-align: center; min-width: 90px;
        }
        .nav-item:hover { transform: translateY(-5px); border-color: var(--blue); }
        .nav-item.active { border-color: var(--blue); background: rgba(88, 166, 255, 0.2); box-shadow: 0 0 15px rgba(88, 166, 255, 0.3); }
        .nav-item span { font-size: 10px; text-transform: uppercase; display: block; margin-top: 5px; color: #8b949e; font-weight: bold; }
        .nav-img { width: 28px; height: 28px; object-fit: contain; margin: 0 auto; display: block; }

        /* Leaderboard Style */
        .leaderboard { background: rgba(13, 17, 23, 0.9); border-radius: 15px; border: 1px solid var(--border); overflow-x: auto; backdrop-filter: blur(10px); }
        .row { display: grid; grid-template-columns: 60px 220px 1fr; align-items: center; padding: 18px 25px; border-bottom: 1px solid #21262d; min-width: 1150px; }
        .row:hover { background: rgba(88, 166, 255, 0.05); }
        
        /* 🚨 ستايل السكين بدون حواف (بحال MCTiers) 🚨 */
        .avatar-box { width: 50px; height: 50px; border-radius: 8px; overflow: hidden; background: rgba(0,0,0,0.3); position: relative; }
        .skin-img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.9) contrast(1.1); mix-blend-mode: luminosity; }
        
        .player-name { color: var(--blue); font-weight: bold; margin-left: 15px; font-size: 1.2em; }
        .skills-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 12px; }
        .skill-box { display: flex; flex-direction: column; align-items: center; opacity: 0.3; transition: 0.4s; }
        .skill-box.active-skill { opacity: 1; transform: scale(1.15); }
        .skill-img { width: 24px; height: 24px; margin-bottom: 6px; object-fit: contain; }

        /* Tiers */
        .badge { 
            padding: 3px; border-radius: 4px; font-size: 10px; font-weight: 900; width: 100%; text-align: center;
            background: #161b22; color: #8b949e; text-transform: uppercase;
        }
        .ht1, .1 { background: var(--gold) !important; color: #000 !important; box-shadow: 0 0 10px var(--gold); }
        .ht2, .2 { background: #95a5a6 !important; color: #000 !important; }
        .ht3, .3 { background: #cd7f32 !important; color: #000 !important; }

        /* 👑 ستايل ذهبي للمركز الأول 👑 */
        .rank-gold { font-weight: 900; color: var(--gold) !important; font-size: 1.4em; text-shadow: 0 0 10px rgba(241, 196, 15, 0.6); }
    </style>
</head>
<body>

    <audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

    <div class="container">
        <div class="header"><h1>MWTier</h1></div>
        <div class="nav-bar">
            <div class="nav-item active" onclick="changeSort('global')">🏆<span>Overall</span></div>
            <div class="nav-item" onclick="changeSort('sword')"><img src="https://mctiers.com/tier_icons/sword.svg" class="nav-img"><span>Sword</span></div>
            <div class="nav-item" onclick="changeSort('axe')"><img src="https://mctiers.com/tier_icons/axe.svg" class="nav-img"><span>Axe</span></div>
            <div class="nav-item" onclick="changeSort('uhc')"><img src="https://static.wikia.nocookie.net/minecraft_gamepedia/images/7/74/Lava_Bucket_JE2_BE2.png" class="nav-img"><span>UHC</span></div>
            <div class="nav-item" onclick="changeSort('mace')"><img src="https://media.forgecdn.net/attachments/914/47/pack.png" class="nav-img"><span>Mace</span></div>
            <div class="nav-item" onclick="changeSort('pot')"><img src="https://mctiers.com/tier_icons/pot.svg" class="nav-img"><span>Pot</span></div>
            <div class="nav-item" onclick="changeSort('spear')"><img src="https://cdn.modrinth.com/data/IcznAN6m/75d921704c939d9cb61471dcd3a1d0b3b94ff07f.png" class="nav-img"><span>Spear</span></div>
            <div class="nav-item" onclick="changeSort('crystal')"><img src="https://cdn.modrinth.com/data/ih5VCK3n/6bd43f541a03d9a9824f536301451c9604c2ab82.png" class="nav-img"><span>Crystal</span></div>
            <div class="nav-item" onclick="changeSort('cart')"><img src="https://static.wikia.nocookie.net/minecraft/images/e/e7/MinecartWithTNT.png" class="nav-img"><span>Cart</span></div>
        </div>
        <div class="leaderboard" id="main-board"></div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSsdJmHbzVV5uDXOYEcjUr_T8T0LTbSL6EMnxdugEuwe1aZsZW0NDMm8Im_qB9xzVEWKyKG50QLhjxJ/pub?output=csv';
        const customSkins = {
            "MystycCr0wn": "https://i.ibb.co/vzS8mYm/mystyc-crown.png", 
            "wa__": "https://i.ibb.co/bM6JpwP8/wa.png",
            "walid_hd": "https://i.ibb.co/MkXYpJ1c/walid-hd.png",
            "HAMZAICZ": "https://i.ibb.co/CGZb1CV/hamza.png"
        };
        let playersData = [];
        let currentSortKey = 'global';
        const tierValue = { 'ht1':100,'1':100,'ht2':80,'2':80,'ht3':60,'3':60,'none':0,'':0 };

        async function init() {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            const rows = text.split('\n').slice(1);
            playersData = rows.map(r => {
                const c = r.split(',').map(s => s.trim());
                return {
                    name: c[0], global: c[1], sword: c[2], axe: c[3], uhc: c[4],
                    mace: c[5], pot: c[6], spear: c[7], crystal: c[11], cart: c[12]
                };
            }).filter(p => p.name);
            render();
        }

        function playSound() {
            const sound = document.getElementById('clickSound');
            sound.currentTime = 0;
            sound.play();
        }

        function render() {
            playersData.sort((a, b) => (tierValue[b[currentSortKey]?.toLowerCase()] || 0) - (tierValue[a[currentSortKey]?.toLowerCase()] || 0));
            const board = document.getElementById('main-board');
            board.innerHTML = '';
            playersData.forEach((p, i) => {
                const skinUrl = customSkins[p.name] || `https://mc-heads.net/avatar/${p.name}`;
                const rankClass = i === 0 ? 'rank-gold' : '';
                const rankIcon = i === 0 ? '👑' : i + 1;
                
                board.innerHTML += `
                    <div class="row">
                        <div class="${rankClass}">${rankIcon}</div>
                        <div style="display:flex; align-items:center;">
                            <div class="avatar-box">
                                <img class="skin-img" src="${skinUrl}" onerror="this.src='https://mc-heads.net/avatar/steve'">
                            </div>
                            <span class="player-name">${p.name}</span>
                        </div>
                        <div class="skills-grid">
                            ${skillItem(p.global, '🏆', 'global', true)}
                            ${skillItem(p.sword, 'https://mctiers.com/tier_icons/sword.svg', 'sword')}
                            ${skillItem(p.axe, 'https://mctiers.com/tier_icons/axe.svg', 'axe')}
                            ${skillItem(p.uhc, 'https://static.wikia.nocookie.net/minecraft_gamepedia/images/7/74/Lava_Bucket_JE2_BE2.png', 'uhc')}
                            ${skillItem(p.mace, 'https://media.forgecdn.net/attachments/914/47/pack.png', 'mace')}
                            ${skillItem(p.pot, 'https://mctiers.com/tier_icons/pot.svg', 'pot')}
                            ${skillItem(p.spear, 'https://cdn.modrinth.com/data/IcznAN6m/75d921704c939d9cb61471dcd3a1d0b3b94ff07f.png', 'spear')}
                            ${skillItem(p.crystal, 'https://cdn.modrinth.com/data/ih5VCK3n/6bd43f541a03d9a9824f536301451c9604c2ab82.png', 'crystal')}
                            ${skillItem(p.cart, 'https://static.wikia.nocookie.net/minecraft/images/e/e7/MinecartWithTNT.png', 'cart')}
                        </div>
                    </div>`;
            });
        }

        function skillItem(val, icon, key, isEmoji = false) {
            const isActive = (currentSortKey === key) ? 'active-skill' : '';
            const iconHtml = isEmoji ? `<span style="font-size:20px">${icon}</span>` : `<img src="${icon}" class="skill-img">`;
            return `
                <div class="skill-box ${isActive}">
                    ${iconHtml}
                    <span class="badge ${val?.toLowerCase() || ''}">${val || '--'}</span>
                </div>`;
        }

        function changeSort(key) {
            playSound();
            currentSortKey = key;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            render();
        }

        init();
    </script>
</body>
</html>
