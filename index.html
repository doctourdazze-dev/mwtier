<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MWTier | Leaderboard</title>
    <style>
        :root {
            --bg: #050000; --card: #0d0101; --border: #3d0505;
            --red-glow: #ff0000; --gold: #ffcc00; --silver: #adb5bd; --text: #f0f6fc;
        }

        body { 
            margin: 0; padding: 0; color: var(--text); font-family: 'Inter', sans-serif;
            background-color: var(--bg); overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- ✨ 1. Background Animation ✨ --- */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(180, 0, 0, 0.15) 0%, transparent 75%);
            z-index: -1; animation: energyPulse 8s infinite alternate ease-in-out;
        }
        @keyframes energyPulse { 0% { opacity: 0.3; transform: scale(0.9); } 100% { opacity: 0.7; transform: scale(1.1); } }

        /* --- ⏳ 2. Cinematic Loader --- */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050000; display: flex; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.8s ease;
        }
        .cube-wrapper { position: relative; width: 100px; height: 100px; }
        .cube-top, .cube-bottom {
            position: absolute; width: 60px; height: 60px;
            border: 3px solid var(--red-glow); transform: rotateX(60deg) rotateZ(45deg);
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.6);
        }
        .cube-top { top: 0; animation: floatTop 2s infinite ease-in-out; }
        .cube-bottom { bottom: 0; background: var(--red-glow); border: none; animation: floatBottom 2s infinite ease-in-out; }
        @keyframes floatTop { 0%, 100% { transform: translateY(0) rotateX(60deg) rotateZ(45deg); } 50% { transform: translateY(-25px) rotateX(60deg) rotateZ(45deg); } }
        @keyframes floatBottom { 0%, 100% { transform: translateY(0) rotateX(60deg) rotateZ(45deg); opacity: 0.9; } 50% { transform: translateY(12px) rotateX(60deg) rotateZ(45deg); opacity: 0.4; } }

        /* --- 🏆 3. Header & Navigation --- */
        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 20px; display: none; }
        .header h1 { 
            font-size: clamp(40px, 10vw, 85px); text-align: center; letter-spacing: 15px; margin: 40px 0; 
            font-weight: 900; color: #fff; text-shadow: 0 0 30px var(--red-glow); text-transform: uppercase;
        }

        .nav-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 40px; }
        .nav-item { 
            background: #110101; border: 1px solid var(--border); padding: 15px 5px; 
            border-radius: 12px; cursor: pointer; text-align: center; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-item.active { border-color: var(--red-glow); background: rgba(255, 0, 0, 0.15); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,0,0,0.2); }
        
        /* Axe & Overall Icon Scaling */
        .nav-img { 
            width: 32px; height: 32px; transform: scale(1.35); filter: drop-shadow(0 0 8px var(--red-glow)); 
            object-fit: contain; margin: 0 auto 10px; display: block; 
        }

        /* --- 🥇 4. Leaderboard Grid --- */
        .leaderboard { background: rgba(10, 1, 1, 0.95); border-radius: 16px; border: 1px solid var(--border); backdrop-filter: blur(15px); }
        .row { display: grid; grid-template-columns: 80px 1fr 90px; align-items: center; padding: 20px; border-bottom: 1px solid #2d0505; transition: 0.2s; }
        .row:hover { background: rgba(255, 255, 255, 0.02); }

        .rank-num { font-size: 1.8em; font-weight: 900; color: #555; text-align: center; }
        .row:nth-child(1) { border-left: 6px solid var(--gold); background: rgba(255, 204, 0, 0.04); }
        .row:nth-child(1) .rank-num { color: var(--gold); text-shadow: 0 0 15px var(--gold); font-size: 2.2em; }

        .avatar-box { 
            width: 65px; height: 65px; overflow: hidden; display: flex; align-items: center; justify-content: center;
            background: #1a0101; border-radius: 12px; border: 1px solid rgba(255, 0, 0, 0.2);
        }
        .skin-img { width: 170%; height: 170%; object-fit: cover; image-rendering: pixelated; }
        .player-name { font-weight: 800; margin-left: 20px; font-size: 1.4em; color: #fff; letter-spacing: 1px; }

        /* Badge Styles */
        .badge { padding: 8px 0; border-radius: 8px; font-size: 13px; font-weight: 900; width: 60px; text-align: center; background: #220202; color: #fff; border: 1px solid rgba(255,255,255,0.05); }
        .ht1, .1 { background: #ff0000 !important; box-shadow: 0 0 15px #ff0000; border: none; }

        /* --- 📱 5. Responsive Logic --- */
        @media (min-width: 769px) {
            .nav-bar { grid-template-columns: repeat(9, 1fr); }
            .row { grid-template-columns: 100px 350px 1fr; }
            .skills-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 15px; }
            .mobile-badge-container { display: none; }
        }

        @media (max-width: 768px) {
            .skills-grid { display: none; }
            .mobile-badge-container { display: flex; justify-content: flex-end; }
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-box">
            <div class="cube-wrapper"><div class="cube-top"></div><div class="cube-bottom"></div></div>
            <div style="letter-spacing: 8px; font-weight: 900; font-size: 14px;">SYSTEM INITIALIZING... <span id="percent">0</span>%</div>
        </div>
    </div>

    <div class="container" id="main-content">
        <div class="header"><h1>MWTier</h1></div>
        
        <div class="nav-bar">
            <div class="nav-item active" onclick="changeSort('global', event)"><img src="https://pvptiers.com/icons/tiers/overall.png" class="nav-img"><span>Overall</span></div>
            <div class="nav-item" onclick="changeSort('sword', event)"><img src="https://mctiers.com/tier_icons/sword.svg" class="nav-img"><span>Sword</span></div>
            <div class="nav-item" onclick="changeSort('axe', event)"><img src="https://pvptiers.com/icons/tiers/axe.png" class="nav-img"><span>Axe</span></div>
            <div class="nav-item" onclick="changeSort('uhc', event)"><img src="https://static.wikia.nocookie.net/minecraft_gamepedia/images/7/74/Lava_Bucket_JE2_BE2.png" class="nav-img"><span>UHC</span></div>
            <div class="nav-item" onclick="changeSort('mace', event)"><img src="https://media.forgecdn.net/attachments/914/47/pack.png" class="nav-img"><span>Mace</span></div>
            <div class="nav-item" onclick="changeSort('pot', event)"><img src="https://mctiers.com/tier_icons/pot.svg" class="nav-img"><span>Pot</span></div>
            <div class="nav-item" onclick="changeSort('spear', event)"><img src="https://cdn.modrinth.com/data/IcznAN6m/75d921704c939d9cb61471dcd3a1d0b3b94ff07f.png" class="nav-img"><span>Spear</span></div>
            <div class="nav-item" onclick="changeSort('crystal', event)"><img src="https://cdn.modrinth.com/data/ih5VCK3n/6bd43f541a03d9a9824f536301451c9604c2ab82.png" class="nav-img"><span>Crystal</span></div>
            <div class="nav-item" onclick="changeSort('cart', event)"><img src="https://static.wikia.nocookie.net/minecraft/images/e/e7/MinecartWithTNT.png" class="nav-img"><span>Cart</span></div>
        </div>

        <div class="leaderboard" id="main-board"></div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSsdJmHbzVV5uDXOYEcjUr_T8T0LTbSL6EMnxdugEuwe1aZsZW0NDMm8Im_qB9xzVEWKyKG50QLhjxJ/pub?output=csv';
        
        // Manual Skin Overrides for HQ Renders
        const customSkins = {
            "MystycCr0wn": "https://i.ibb.co/rfvySyzd/avatar-Head3.png", 
            "wa__": "https://i.ibb.co/RTprQ2kX/wa.png",
            "walid_hd": "https://i.ibb.co/k66xzs6T/walid-hd.png",
            "HAMZAICZ": "https://i.ibb.co/SXtg8s4w/hamza.png",
            "minimokito": "https://i.ibb.co/v4jBX2TR/minimokito.png"
        };

        let playersData = [];
        let currentSortKey = 'global';

        // Weights for the Sorting Algorithm
        const tierMap = { 'ht1':100, '1':100, 'lt1':95, 'ht2':85, '2':85, 'lt2':80, 'ht3':70, '3':70, 'lt3':65 };

        async function init() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const rows = text.split('\n').slice(1);
                playersData = rows.map(r => {
                    const c = r.split(',').map(s => s.trim());
                    return { 
                        name: c[0], global: c[1], sword: c[2], axe: c[3], 
                        uhc: c[4], mace: c[5], pot: c[6], spear: c[7], 
                        crystal: c[11], cart: c[12] 
                    };
                }).filter(p => p.name);
                render();
            } catch (e) { console.error("Critical Data Error:", e); }
        }

        function render() {
            // Sort players based on current skill selection
            playersData.sort((a, b) => (tierMap[b[currentSortKey]?.toLowerCase()] || 0) - (tierMap[a[currentSortKey]?.toLowerCase()] || 0));
            
            const board = document.getElementById('main-board');
            board.innerHTML = '';

            playersData.forEach((p, i) => {
                const skin = customSkins[p.name] || `https://mc-heads.net/avatar/${p.name}`;
                board.innerHTML += `
                    <div class="row">
                        <div class="rank-num">${i === 0 ? '👑' : i + 1}</div>
                        <div style="display:flex; align-items:center;">
                            <div class="avatar-box"><img class="skin-img" src="${skin}"></div>
                            <span class="player-name">${p.name}</span>
                        </div>
                        
                        <div class="mobile-badge-container">
                            <div class="badge ${p[currentSortKey]?.toLowerCase() || ''}">${p[currentSortKey] || '--'}</div>
                        </div>

                        <div class="skills-grid">
                            ${skill(p.global, 'https://pvptiers.com/icons/tiers/overall.png', 'global')}
                            ${skill(p.sword, 'https://mctiers.com/tier_icons/sword.svg', 'sword')}
                            ${skill(p.axe, 'https://pvptiers.com/icons/tiers/axe.png', 'axe')}
                            ${skill(p.uhc, 'https://static.wikia.nocookie.net/minecraft_gamepedia/images/7/74/Lava_Bucket_JE2_BE2.png', 'uhc')}
                            ${skill(p.mace, 'https://media.forgecdn.net/attachments/914/47/pack.png', 'mace')}
                            ${skill(p.pot, 'https://mctiers.com/tier_icons/pot.svg', 'pot')}
                            ${skill(p.spear, 'https://cdn.modrinth.com/data/IcznAN6m/75d921704c939d9cb61471dcd3a1d0b3b94ff07f.png', 'spear')}
                            ${skill(p.crystal, 'https://cdn.modrinth.com/data/ih5VCK3n/6bd43f541a03d9a9824f536301451c9604c2ab82.png', 'crystal')}
                            ${skill(p.cart, 'https://static.wikia.nocookie.net/minecraft/images/e/e7/MinecartWithTNT.png', 'cart')}
                        </div>
                    </div>`;
            });
        }

        function skill(val, img, key) {
            const activeStyle = (currentSortKey === key) ? 'style="opacity:1; transform:scale(1.15);"' : 'style="opacity:0.3"';
            return `
                <div class="skill-box" ${activeStyle}>
                    <img src="${img}" style="width:24px; height:24px; margin-bottom:5px; filter:drop-shadow(0 0 3px rgba(255,0,0,0.4));">
                    <div class="badge ${val?.toLowerCase() || ''}">${val || '--'}</div>
                </div>`;
        }

        function changeSort(key, event) {
            currentSortKey = key;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            render();
        }

        // Loader Execution
        window.onload = () => {
            let count = 0;
            let interval = setInterval(() => {
                count++;
                document.getElementById('percent').innerText = count;
                if (count >= 100) {
                    clearInterval(interval);
                    document.getElementById('loading-screen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loading-screen').style.display = 'none';
                        document.getElementById('main-content').style.display = 'block';
                    }, 800);
                }
            }, 40); // Standard 4-second load
            init();
        };
    </script>
</body>
</html>
